<div class="tasks-container">
  <app-add-task (onAddTask)="addTask($event)"></app-add-task>
  @for (task of tasks(); track task.id) {
    <app-tasks-item 
      [task]="task" 
      (deleteTask)="deleteTask(task)" 
      (toggleReminder)="onToggleReminder(task)">
    </app-tasks-item>
  }
  @if (tasks().length === 0) {
    <p>{{ emptyTasksError() }}</p>
  }
</div>
